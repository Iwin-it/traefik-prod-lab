name: Kubernetes Deploy

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Show repository files
      run: ls -la

    - name: Build Docker image
      run: docker build -t traefik-prod-lab:test .
