name: Kubernetes Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  package: write

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Build Docker image
      run: docker build -t ghcr.io/iwin-it/traefik-prod-lab:${{ github.sha }} .

    - name: Push Docker image
      run: docker push ghcr.io/iwin-it/traefik-prod-lab:${{ github.sha }}
