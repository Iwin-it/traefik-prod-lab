services:
  traefik:
    image: traefik:${TRAEFIK_VERSION}
    container_name: traefik
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s


    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./configs/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./configs/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./configs/certs:/certs:ro

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls=true"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=secure-headers@file,dashboard-auth@file"

      - "traefik.http.routers.metrics.rule=Host(`traefik.local`) && PathPrefix(`/metrics`)"
      - "traefik.http.routers.metrics.entrypoints=websecure"
      - "traefik.http.routers.metrics.tls=true"
      - "traefik.http.routers.metrics.service=prometheus@internal"
      - "traefik.http.routers.metrics.middlewares=secure-headers@file,dashboard-auth@file"



    networks:
      - proxy

  app:
    image: nginx:alpine
    restart: unless-stopped

    command:
      - /bin/sh
      - -c
      - |
        echo "<h1>APP container $(hostname)</h1>" > /usr/share/nginx/html/index.html
        nginx -g "daemon off;"

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s


    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.middlewares=secure-headers@file"
      - "traefik.http.services.app.loadbalancer.server.port=80"
      - "traefik.http.routers.app.priority=1"

    networks:
      - proxy

  api:
    image: python:3.12-alpine
    restart: unless-stopped

    working_dir: /app
    command: python server.py

    volumes:
      - ./apps/api:/app:ro

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.middlewares=api-strip,secure-headers@file"
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
      - "traefik.http.routers.api.priority=100"

    networks:
      - proxy

  admin:
    image: nginx:alpine
    restart: unless-stopped

    volumes:
      - ./apps/admin:/usr/share/nginx/html:ro


    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3


    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.admin.rule=Host(`${ADMIN_DOMAIN}`)"
      - "traefik.http.routers.admin.entrypoints=websecure"
      - "traefik.http.routers.admin.tls=true"

      - "traefik.http.routers.admin.middlewares=secure-headers@file,dashboard-auth@file"
      - "traefik.http.services.admin.loadbalancer.server.port=80"

    networks:
      - proxy


  prometheus:
      image: prom/prometheus:latest
      restart: unless-stopped


      volumes:
       - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

      labels:
       - "traefik.enable=true"

       - "traefik.http.routers.prometheus.rule=Host(`prometheus.local`)"
       - "traefik.http.routers.prometheus.entrypoints=websecure"
       - "traefik.http.routers.prometheus.tls=true"

       - "traefik.http.routers.prometheus.middlewares=secure-headers@file,dashboard-auth@file"
       - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

      networks:
        - proxy

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped

    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=Password123

    labels:
       - "traefik.enable=true"

       - "traefik.http.routers.grafana.rule=Host(`grafana.local`)"
       - "traefik.http.routers.grafana.entrypoints=websecure"
       - "traefik.http.routers.grafana.tls=true"

       - "traefik.http.routers.grafana.middlewares=secure-headers@file,dashboard-auth@file"
       - "traefik.http.services.grafana.loadbalancer.server.port=3000"

    networks:
      - proxy

networks:
  proxy:
    name: proxy
